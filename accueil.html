    <title>Page d'Accueil Chrome Personnalisée</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
<style>
        .custom-card {
            width: 100px; /* Largeur fixe de la carte */
            height: 100px; /* Hauteur fixe pour une carte carrée ou petite */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 10px; /* Marge autour de la carte */
            border: none; /* Enlever la bordure par défaut de bootstrap */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Ombre légère pour effet */
            transition: transform 0.2s;
        }

        .custom-card:hover {
            transform: scale(1.05); /* Effet de zoom au survol */
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .custom-card a {
            text-decoration: none; /* Enlever le soulignement du lien */
            color: inherit; /* Utiliser la couleur de texte par défaut */
            display: block;
            height: 100%;
            width: 100%;
            padding: 5px; /* Remplissage intérieur */
            font-size: 0.8rem; /* Taille de police plus petite */
        }

        .card-icon {
            font-size: 2rem; /* Taille de l'icône */
            margin-bottom: 5px;
        }
    </style>
</head>
