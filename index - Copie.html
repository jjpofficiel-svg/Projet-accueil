<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page d'Accueil Chrome Personnalisée</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <style>
        .custom-card {
            width: 100px; /* Largeur fixe de la carte */
            height: 100px; /* Hauteur fixe pour une carte carrée ou petite */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 10px; /* Marge autour de la carte */
            border: none; /* Enlever la bordure par défaut de bootstrap */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Ombre légère pour effet */
            transition: transform 0.2s;
        }

        .custom-card:hover {
            transform: scale(1.05); /* Effet de zoom au survol */
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .custom-card a {
            text-decoration: none; /* Enlever le soulignement du lien */
            color: inherit; /* Utiliser la couleur de texte par défaut */
            display: block;
            height: 100%;
            width: 100%;
            padding: 5px; /* Remplissage intérieur */
            font-size: 0.8rem; /* Taille de police plus petite */
        }

        .card-icon {
            font-size: 2rem; /* Taille de l'icône */
            margin-bottom: 5px;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h1 class="text-center mb-4">🏠 Mon Accueil Rapide</h1>

        <div class="row justify-content-center">
            
            <div class="col-auto">
                <div class="card custom-card bg-white">
                    <a href="https://www.google.com" target="_blank">
                        <span class="card-icon">🔎</span> <div>Google</div>
                    </a>
                </div>
            </div>

            <div class="col-auto">
                <div class="card custom-card bg-danger text-white">
                    <a href="https://www.youtube.com" target="_blank">
                        <span class="card-icon">▶️</span>
                        <div>YouTube</div>
                    </a>
                </div>
            </div>

            <div class="col-auto">
                <div class="card custom-card bg-warning">
                    <a href="https://mail.google.com" target="_blank">
                        <span class="card-icon">📧</span>
                        <div>Gmail</div>
                    </a>
                </div>
            </div>

            <div class="col-auto">
                <div class="card custom-card bg-info text-white">
                    <a href="mailto:" target="_blank">
                        <span class="card-icon">✉️</span>
                        <div>Écrire un Mail</div>
                    </a>
                </div>
            </div>

            <div class="col-auto">
                <div class="card custom-card bg-dark text-white">
                    <a href="https://github.com" target="_blank">
                        <span class="card-icon">💻</span>
                        <div>GitHub</div>
                    </a>
                </div>
            </div>

            </div> 
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
